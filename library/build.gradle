plugins {
    alias(libs.plugins.android.library)
    id 'maven-publish'
    alias(libs.plugins.jetbrains.kotlin.android)
}

android {
    namespace 'io.fastpix.data'
    compileSdk 35

    defaultConfig {
        minSdk 24

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {

    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.core.ktx
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core

    api "androidx.test.espresso:espresso-core:3.6.1"
    api "com.google.ads.interactivemedia.v3:interactivemedia:3.36.0"

    api "androidx.media3:media3-exoplayer-dash:1.5.1"
    api "androidx.media3:media3-exoplayer-ima:1.5.1"
    api "androidx.media3:media3-exoplayer-hls:1.5.1"
    api "androidx.media3:media3-exoplayer:1.5.1"
    api "androidx.media3:media3-common:1.5.1"
}

publishing {
    publications {
        create("bar", MavenPublication) { publication ->
            groupId = "io.fastpix.data"
            artifactId = "core-android-sdk"
            version = "1.0.0"

            artifact("$buildDir/outputs/aar/library-release.aar")

            pom.withXml {
                def dependenciesNode = asNode().appendNode("dependencies")
                configurations.api.allDependencies.each { dependency ->
                    if (dependency.group != null && dependency.name != null && dependency.version != null) {
                        def dependencyNode = dependenciesNode.appendNode("dependency")
                        dependencyNode.appendNode("groupId", dependency.group)
                        dependencyNode.appendNode("artifactId", dependency.name)
                        dependencyNode.appendNode("version", dependency.version)
                        dependencyNode.appendNode("scope", "aar")
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = "GithubPackages"
            url = uri("https://maven.pkg.github.com/FastPix/android-data-core-sdk")

            credentials{
                username = project.findProperty("gpr.user") ?: ""
                password = project.findProperty("gpr.key") ?: ""
            }
        }
    }

}
